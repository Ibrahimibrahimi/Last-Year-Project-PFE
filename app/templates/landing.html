<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{url_for('static',filename='css/landing.css')}}">
</head>
<body>
    <!-- NAVBAR -->
    <nav>
        <div class="logo">CodeNest</div>
        <div class="nav-links">
            <a href="#courses">Courses</a>
            <a href="#languages">Languages</a>
            <a href="#about">About</a>
        </div>
        <div class="nav-auth">
            <a href="/login" class="btn-login">Login</a>
            <a href="/register" class="btn-register">Register</a>
        </div>
    </nav>
    <!-- HERO -->
    <section class="hero">
        <div class="hero-text">
            <h1>Welcome to <span>CodeNest</span></h1>
            <p>Learn programming at your own pace. Free courses, live code editor, and a community of learners ready to help
                you grow.</p>
            <a href="/register" class="btn-signup">Sign Up — It's Free</a>
        </div>
    
        <div class="hero-stats">
            <div class="stat">
                <div class="num">{{n_students}}</div>
                <div class="lbl">Students</div>
            </div>
            <div class="divider"></div>
            <div class="stat">
                <div class="num">{{n_lessons}}</div>
                <div class="lbl">Free Courses</div>
            </div>
            <div class="divider"></div>
            <div class="stat">
                <div class="num">{{n_langs}}</div>
                <div class="lbl">Languages</div>
            </div>
        </div>
    </section>
</body>
</html>
