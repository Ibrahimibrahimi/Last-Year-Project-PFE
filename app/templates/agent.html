<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tutor — LearnCode</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Project stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  <style>
    /* ── Layout ── */
    body { font-family: var(--lc-font, 'Space Grotesk', sans-serif); background: var(--lc-bg, #f8fafc); }

    .chatbot-wrapper {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 64px);   /* full viewport minus navbar */
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 1rem 1rem;
    }

    /* ── Header ── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-shrink: 0;
    }

    .chat-header-avatar {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .chat-header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0;
      color: var(--lc-text, #1e293b);
    }

    .chat-header p {
      font-size: 0.8rem;
      margin: 0;
      color: var(--lc-muted, #64748b);
    }

    .chat-status-dot {
      width: 8px; height: 8px;
      background: #16a34a;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    /* ── Messages area ── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: var(--lc-surface, #fff);
      border: 1px solid var(--lc-border, #e2e8f0);
      border-radius: var(--lc-radius, 12px);
      scroll-behavior: smooth;
    }

    /* ── Individual message ── */
    .chat-message {
      display: flex;
      max-width: 80%;
    }

    .chat-message--user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .chat-message--bot {
      align-self: flex-start;
    }

    .chat-bubble {
      padding: 0.65rem 1rem;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .chat-message--user .chat-bubble {
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .chat-message--bot .chat-bubble {
      background: var(--lc-surface2, #f1f5f9);
      color: var(--lc-text, #1e293b);
      border-bottom-left-radius: 4px;
    }

    /* Inline code */
    .chat-bubble code {
      background: rgba(99, 102, 241, 0.12);
      color: #4f46e5;
      padding: 0.1em 0.35em;
      border-radius: 4px;
      font-family: var(--lc-mono, 'JetBrains Mono', monospace);
      font-size: 0.85em;
    }

    .chat-message--user .chat-bubble code {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* Code blocks */
    .chat-code-block {
      margin-top: 0.5rem;
      border-radius: 8px;
      overflow: hidden;
      background: #1e293b;
    }

    .chat-code-lang {
      display: block;
      background: #334155;
      color: #94a3b8;
      font-size: 0.72rem;
      font-family: var(--lc-mono, monospace);
      padding: 0.25rem 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .chat-code-block pre {
      margin: 0;
      padding: 0.75rem 1rem;
      overflow-x: auto;
    }

    .chat-code-block code {
      background: transparent;
      color: #e2e8f0;
      font-size: 0.85rem;
      padding: 0;
      border-radius: 0;
    }

    /* ── Typing dots ── */
    .chat-typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      height: 20px;
    }

    .chat-typing-dots span {
      width: 7px; height: 7px;
      background: var(--lc-muted, #64748b);
      border-radius: 50%;
      animation: typing-bounce 1.2s infinite ease-in-out;
    }

    .chat-typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input area ── */
    .chat-input-area {
      flex-shrink: 0;
      margin-top: 0.75rem;
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      background: var(--lc-surface, #fff);
      border: 1px solid var(--lc-border, #e2e8f0);
      border-radius: var(--lc-radius, 12px);
      padding: 0.6rem 0.75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: border-color 0.2s;
    }

    .chat-input-area:focus-within {
      border-color: var(--lc-accent, #6366f1);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    #chat-input {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      font-family: var(--lc-font, 'Space Grotesk', sans-serif);
      font-size: 0.92rem;
      color: var(--lc-text, #1e293b);
      max-height: 150px;
      overflow-y: auto;
      line-height: 1.5;
    }

    #chat-input::placeholder { color: var(--lc-muted, #94a3b8); }

    #chat-send {
      width: 38px; height: 38px;
      flex-shrink: 0;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    #chat-send:hover:not(:disabled) { opacity: 0.9; transform: scale(1.05); }
    #chat-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .chat-hint {
      font-size: 0.75rem;
      color: var(--lc-muted, #94a3b8);
      text-align: center;
      margin-top: 0.4rem;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────── -->
  <nav class="navbar lc-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('main.dashboard') }}">
        &lt;LearnCode /&gt;
      </a>
      <div class="d-flex align-items-center gap-3">
        {% if current_user.is_authenticated %}
          <span class="lc-badge-xp">⚡ {{ current_user.xp }} XP</span>
          <a href="{{ url_for('main.dashboard') }}" class="nav-link">Dashboard</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- ── Chat UI ──────────────────────────────────────── -->
  <div class="chatbot-wrapper">

    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-avatar">🤖</div>
      <div>
        <h1>AI Coding Tutor</h1>
        <p><span class="chat-status-dot"></span>Online — powered by Claude</p>
      </div>
    </div>

    <!-- Messages -->
    <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages"></div>

    <!-- Input -->
    <form id="chat-form" autocomplete="off">
      <div class="chat-input-area">
        <textarea
          id="chat-input"
          rows="1"
          placeholder="Ask me anything about coding… (Enter to send)"
          aria-label="Message input"
        ></textarea>
        <button type="submit" id="chat-send" aria-label="Send message">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11Z"/>
          </svg>
        </button>
      </div>
    </form>
    <p class="chat-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for a new line</p>

  </div>

  <!-- Bootstrap JS (needed for spinner) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Chat logic -->
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
